version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ai_advising_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - ENV=dev
      - CORS_ORIGINS=http://localhost:5173
      - LLM_PROVIDER=mock

  frontend:
    build: ./frontend
    container_name: ai_advising_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    depends_on:
      - backend
